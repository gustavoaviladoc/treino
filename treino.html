<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Meu Treino">
<title>Meu Treino</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#f2f2f7;color:#1c1c1e;min-height:100vh;padding-bottom:40px;}
.header{background:#fff;padding:16px 16px 12px;border-bottom:0.5px solid rgba(0,0,0,0.12);position:sticky;top:0;z-index:10;}
.header h1{font-size:22px;font-weight:600;color:#1c1c1e;}
.header p{font-size:13px;color:#8e8e93;margin-top:2px;}
.week-nav{display:flex;gap:6px;overflow-x:auto;padding:12px 16px;scrollbar-width:none;background:#fff;border-bottom:0.5px solid rgba(0,0,0,0.08);}
.week-nav::-webkit-scrollbar{display:none;}
.day-btn{flex:0 0 auto;padding:7px 16px;border-radius:20px;border:1px solid #d1d1d6;background:#fff;color:#8e8e93;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s;position:relative;}
.day-btn.active{background:#1c1c1e;color:#fff;border-color:#1c1c1e;}
.day-btn.has-progress:not(.active){border-color:#34c759;color:#34c759;}
.day-btn .dot{position:absolute;top:4px;right:4px;width:6px;height:6px;border-radius:50%;background:#34c759;display:none;}
.day-btn.partial .dot{display:block;}
.content{padding:16px;}
.day-header{background:#fff;border-radius:14px;padding:16px;margin-bottom:8px;border:0.5px solid rgba(0,0,0,0.08);}
.day-title{font-size:18px;font-weight:600;color:#1c1c1e;}
.day-sub{font-size:13px;color:#8e8e93;margin-top:3px;}
.progress-wrap{margin-top:12px;display:flex;align-items:center;gap:10px;}
.progress-bar-bg{flex:1;height:5px;background:#e5e5ea;border-radius:5px;overflow:hidden;}
.progress-bar{height:100%;background:#34c759;border-radius:5px;transition:width 0.3s;}
.progress-label{font-size:13px;color:#8e8e93;min-width:52px;text-align:right;}
.section-label{font-size:12px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:0.05em;margin:20px 0 8px 4px;}
.exercise-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:14px;cursor:pointer;border:0.5px solid rgba(0,0,0,0.08);transition:background 0.15s;}
.exercise-card.done{background:#f0fdf4;border-color:#bbf7d0;}
.check{width:24px;height:24px;border-radius:50%;border:1.5px solid #d1d1d6;flex:0 0 24px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.exercise-card.done .check{background:#34c759;border-color:#34c759;}
.checkmark{display:none;width:13px;height:13px;}
.exercise-card.done .checkmark{display:block;}
.ex-info{flex:1;}
.ex-name{font-size:15px;font-weight:500;color:#1c1c1e;transition:color 0.15s;}
.ex-detail{font-size:13px;color:#8e8e93;margin-top:2px;}
.exercise-card.done .ex-name{color:#15803d;}
.exercise-card.done .ex-detail{color:#4ade80;}
.zone-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500;background:#e0f2fe;color:#0369a1;margin-top:5px;}
.reset-btn{width:100%;margin-top:20px;padding:13px;border:1px solid #d1d1d6;border-radius:12px;background:#fff;color:#8e8e93;font-size:14px;cursor:pointer;font-weight:500;}
.reset-btn:active{background:#f2f2f7;}
.week-reset{font-size:13px;color:#ff3b30;background:none;border:none;cursor:pointer;padding:0;float:right;margin-top:2px;}
</style>
</head>
<body>

<div class="header">
  <h1>Meu Treino</h1>
  <p>Semana 1 · Bloco de retomada</p>
</div>

<div class="week-nav" id="weekNav"></div>

<div class="content">
  <div id="dayContent"></div>
</div>

<script>
const days = [
  {id:'seg',label:'Seg',type:'musculacao',title:'Musculação',sub:'Segunda-feira · manhã'},
  {id:'ter',label:'Ter',type:'bike',title:'Bike noturna',sub:'Terça-feira · a partir das 20h'},
  {id:'qua',label:'Qua',type:'musculacao',title:'Musculação',sub:'Quarta-feira · manhã'},
  {id:'qui',label:'Qui',type:'bike',title:'Bike noturna',sub:'Quinta-feira · a partir das 20h'},
  {id:'sex',label:'Sex',type:'musculacao',title:'Musculação',sub:'Sexta-feira · manhã'},
  {id:'sab',label:'Sáb',type:'bike_longa',title:'Bike longa',sub:'Sábado ou domingo · manhã'},
];

const musculacao = [
  {section:'Aquecimento (15 min)',items:[
    {name:'Esteira leve',detail:'15 min · ritmo leve'},
    {name:'Mobilidade articular',detail:'Quadril, ombros e coluna · 5 min'},
  ]},
  {section:'Membros inferiores',items:[
    {name:'Cadeira extensora',detail:'3 séries · 12–15 reps'},
    {name:'Cadeira flexora',detail:'3 séries · 12–15 reps'},
    {name:'Elevação de quadril',detail:'3 séries · 12–15 reps · carga leve'},
    {name:'Afundo',detail:'3 séries · 12 reps · sem carga ou leve'},
  ]},
  {section:'Membros superiores',items:[
    {name:'Supino com halteres',detail:'3 séries · 12–15 reps'},
    {name:'Remada na polia baixa',detail:'3 séries · 12–15 reps'},
    {name:'Desenvolvimento com halteres',detail:'3 séries · 12–15 reps'},
    {name:'Rosca direta',detail:'3 séries · 12–15 reps'},
    {name:'Tríceps na polia',detail:'3 séries · 12–15 reps'},
  ]},
  {section:'Costas',items:[
    {name:'Puxada na polia alta',detail:'3 séries · 12–15 reps · alternar pegada'},
    {name:'Remada cavalinho',detail:'3 séries · 12–15 reps'},
  ]},
  {section:'Core',items:[
    {name:'Prancha frontal',detail:'3x · 30–45 seg'},
    {name:'Prancha lateral',detail:'3x cada lado · 20–30 seg'},
    {name:'Bird-dog',detail:'3x · 10 reps cada lado'},
  ]},
  {section:'Desaquecimento (15 min)',items:[
    {name:'Alongamento geral',detail:'Quadril, costas e ombros'},
  ]},
];

const bike = [
  {section:'Pedalada noturna',items:[
    {name:'Duração alvo',detail:'40–50 min'},
    {name:'Ritmo',detail:'Leve a moderado'},
    {name:'Hidratação',detail:'Beba água antes, durante e após'},
  ]},
  {section:'Zonas de FC alvo',items:[
    {name:'Zona 2 · base aeróbica',detail:'107–125 bpm · foco principal',zone:true},
    {name:'Zona 3 · moderado',detail:'125–143 bpm · trechos pontuais',zone:true},
  ]},
];

const bike_longa = [
  {section:'Saída longa',items:[
    {name:'Distância (semanas 1–2)',detail:'50 km'},
    {name:'Distância (semanas 3–4)',detail:'55–60 km'},
    {name:'Progressão',detail:'+10% por semana'},
  ]},
  {section:'Zonas de FC alvo',items:[
    {name:'Zona 2 · base aeróbica',detail:'107–125 bpm · maior parte do tempo',zone:true},
    {name:'Zona 3 · moderado',detail:'125–143 bpm · se sentir bem',zone:true},
  ]},
  {section:'Nutrição e hidratação',items:[
    {name:'Pré-treino',detail:'Algo leve 1h antes'},
    {name:'Durante',detail:'Barra ou fruta após 45 min'},
    {name:'Hidratação',detail:'Mínimo 500ml por hora'},
  ]},
];

const dataMap = {musculacao, bike, bike_longa};
const STORAGE_KEY = 'treino_state_v1';

let state = {};
try { state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) {}

let current = 'seg';

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getKey(dayId, idx) { return dayId + '_' + idx; }

function flatItems(sections) {
  const flat = [];
  sections.forEach(s => s.items.forEach(item => flat.push(item)));
  return flat;
}

function renderNav() {
  const nav = document.getElementById('weekNav');
  nav.innerHTML = '';
  days.forEach(d => {
    const flat = flatItems(dataMap[d.type]);
    const done = flat.filter((_, i) => state[getKey(d.id, i)]).length;
    const total = flat.length;
    const btn = document.createElement('button');
    let cls = 'day-btn';
    if (d.id === current) cls += ' active';
    if (done > 0 && done < total && d.id !== current) cls += ' has-progress partial';
    if (done === total && done > 0 && d.id !== current) cls += ' has-progress';
    btn.className = cls;
    btn.innerHTML = d.label + '<span class="dot"></span>';
    btn.onclick = () => { current = d.id; render(); };
    nav.appendChild(btn);
  });
}

function render() {
  renderNav();
  const day = days.find(d => d.id === current);
  const sections = dataMap[day.type];
  const flat = flatItems(sections);
  const done = flat.filter((_, i) => state[getKey(day.id, i)]).length;
  const total = flat.length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  let html = `<div class="day-header">
    <div class="day-title">${day.title}</div>
    <div class="day-sub">${day.sub}</div>
    <div class="progress-wrap">
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="progress-label">${done}/${total} feitos</div>
    </div>
  </div>`;

  let gi = 0;
  sections.forEach(sec => {
    html += `<div class="section-label">${sec.section}</div>`;
    sec.items.forEach(item => {
      const idx = gi;
      const isDone = !!state[getKey(day.id, idx)];
      html += `<div class="exercise-card${isDone ? ' done' : ''}" onclick="toggle('${day.id}',${idx})">
        <div class="check">
          <svg class="checkmark" viewBox="0 0 13 13" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="2,7 5,10 11,3"/>
          </svg>
        </div>
        <div class="ex-info">
          <div class="ex-name">${item.name}</div>
          <div class="ex-detail">${item.detail}</div>
          ${item.zone ? '<span class="zone-badge">FC</span>' : ''}
        </div>
      </div>`;
      gi++;
    });
  });

  html += `<button class="reset-btn" onclick="resetDay('${day.id}')">Limpar dia</button>`;
  document.getElementById('dayContent').innerHTML = html;
}

function toggle(dayId, idx) {
  const k = getKey(dayId, idx);
  state[k] = !state[k];
  save();
  render();
}

function resetDay(dayId) {
  Object.keys(state).forEach(k => { if (k.startsWith(dayId + '_')) delete state[k]; });
  save();
  render();
}

render();
</script>
</body>
</html>
